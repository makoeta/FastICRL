[project]
name = "fasticrl"
version = "0.1.0pre"
description = "Easy way to create ICRL context for LLMs."
readme = "README.md"
authors = [
    { name = "Maximilian König", email = "maximilian.koenig@mein.gmx" }
]
requires-python = ">=3.13"
dependencies = [
    "ollama>=0.6.2",
    "openai>=2.32.0",
]

[build-system]
requires = ["uv_build>=0.8.15,<0.9.0"]
build-backend = "uv_build"
